<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana's Happiness Haven</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Emilys Candy", serif;
            font-weight: 400;
            text-align: center;
            margin-top: 100px;
            background-color: #ffbaff;
        }

        h1 {
            margin-bottom: 30px;
        }

        button {
            font-size: 20px;
            padding: 15px 30px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #c076ca;
            color: white;
        }

        button:hover {
            background-color: #1c8d38;
        }

        #nowPlaying {
            margin-top: 20px;
            font-size: 18px;
        }
        #sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="sparkles"></canvas>

    <h1>Hana's Happiness Haven ^~^</h1>

    <button id="playButton">
        Click to hear me :3
    </button>

    <div id="nowPlaying"></div>

    <script src="script.js"></script>

</body>
</html>
